name: Docker Build & Publish

on:
  push:
    branches: [test, master]
    tags: ['v*']
  pull_request:
    branches: [test, master]
  release:
    types: [published]

jobs:
  build:
    # Point this to the main branch of the central project repo (e.g., @master or @test depending on deployment state)
    uses: ufal/atrium-project/.github/workflows/docker-tool.reusable.yml@test
    secrets: inherit
    with:
      image-name: ufal/atrium-translator
      apt-packages: ""
      pre-install-torch: ""
      requirements: requirements.txt requirements-test.txt
      hf-model-cache: false
      build-targets: '["base"]'
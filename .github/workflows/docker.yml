name: Docker Build & Push

on:
  push:
    branches: [ test, master ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ test, master ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    uses: ufal/atrium-project/.github/workflows/docker-tool.reusable.yml@test
    with:
      image-name: ${{ github.repository }}
    secrets: inherit

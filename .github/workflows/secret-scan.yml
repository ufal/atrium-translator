name: Secret Scanning

on:
  push:
    branches: [test, master]
  pull_request:
    branches: [test, master]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

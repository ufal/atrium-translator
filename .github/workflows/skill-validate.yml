# Agent-Skill branch validation (atrium-project#31, strategy §12.3).
# Lives on the `agent-skill` branch of atrium-translator; calls the hub reusable workflow.
name: Skill Branch Validation

on:
  push:
    branches: [agent-skill]
  pull_request:
    branches: [agent-skill]

jobs:
  skill-validate:
    uses: ufal/atrium-project/.github/workflows/skill-validate.reusable.yml@test
    with:
      client-script: scripts/atrium_translate.py
      # skill-docs: "SKILL.md README.md service/README.md"   # (default)

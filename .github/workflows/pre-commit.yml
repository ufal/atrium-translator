# atrium-translator — pre-commit in CI
#
# Runs this repo's .pre-commit-config.yaml in CI so the hooks (ruff,
# whitespace/large-file guards) are enforced, not just available locally.
# Mirrors the alto-postprocess / page-classification callers.

name: pre-commit

on:
  pull_request:
    branches: [test, master]
  push:
    branches: [test, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

name: Scheduled Smoke Testing Suite

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Execute Test Execution Suite
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          pip install -r requirements.txt -r requirements-test.txt
          pytest tests/

      - name: Log Issues on Processing Breaches
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Scheduled Verification Failure :(',
              body: 'Automated validation sequence encounters terminal processing errors. Review details within execution logs.'
            })

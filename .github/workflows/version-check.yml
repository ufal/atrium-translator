name: Version Consistency Check

on:
  push:
    tags: [ "v*.*.*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate CITATION.cff matches para_config.txt
        run: |
          CFF_VER=$(grep "^version:" CITATION.cff | awk '{print $2}' | tr -d '"' | tr -d "'")
          PARA_VER=$(grep "\[tool\] version" para_config.txt | awk -F'=' '{print $2}' | tr -d ' "' | tr -d "'")
          
          if [ -z "$CFF_VER" ] || [ -z "$PARA_VER" ]; then
            echo "Error: Could not extract version strings."
            exit 1
          fi
          
          if [ "$CFF_VER" != "$PARA_VER" ]; then
            echo "Version mismatch detected!"
            echo "CITATION.cff:   $CFF_VER"
            echo "para_config.txt: $PARA_VER"
            exit 1
          fi
          
          echo "Versions match: $CFF_VER"
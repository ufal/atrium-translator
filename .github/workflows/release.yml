name: Release Package Bundle

on:
  release:
    types: [published]

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate Independent Application Zip
        run: |
          zip -r atrium-translator-release.zip \
            service/ \
            processors/ \
            atrium_paradata.py \
            para_licenses.py \
            service/requirements.txt \
            main.py \
            para_config.txt

name: Release Bundle

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build deployment package
        run: |
          mkdir -p dist/service
          cp main.py processors/ utils.py load_vocab.py atrium_paradata.py para_licenses.py para_config.txt dist/ -r
          cp service/api.py service/requirements.txt dist/service/ -r
          cd dist
          zip -r ../atrium-translator-release.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: atrium-translator-release.zip
          generate_release_notes: true

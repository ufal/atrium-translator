name: Scheduled Smoke Test

permissions:
  contents: read
  actions: read
  issues: write          # required by "Open Issue on Failure"; GitHub's 403 asked
                         # for exactly this (x-accepted-github-permissions: issues=write).
                         # A permissions block WITHOUT it pins issues=none -> 403.

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:     # allow manual re-runs

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements-test.txt
          pip install -r requirements.txt
          pip install -r service/requirements.txt

      - name: Run Pytest
        run: pytest tests/

      - name: Open Issue on Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled Smoke Test Failed',
              body: 'The automated daily smoke test failed. Please review the action logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['bug', 'automated issue']
            })

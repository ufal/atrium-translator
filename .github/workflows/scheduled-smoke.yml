name: Scheduled Smoke Test

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:          # allow manual re-runs (parity with the rest of the suite)

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    permissions:              # fix: the "Open Issue on Failure" step needs issues:write,
      contents: read          # otherwise github.rest.issues.create returns
      issues: write           # "Resource not accessible by integration"
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        # fix: install requirements.txt — it carries fasttext-wheel, which
        # processors/identifier.py imports at module top. Omitting it made
        # pytest fail at collection (exit 2) before any test ran.
        run: pip install -r requirements.txt -r service/requirements.txt -r requirements-test.txt

      - name: Run Pytest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pytest tests/

      - name: Open Issue on Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled Smoke Test Failed',
              body: 'The automated daily smoke test failed. Please review the action logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['bug', 'automated issue']
            })

name: Scheduled Smoke Test

on:
  schedule:
    - cron: '0 4 * * *'

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements-test.txt
          pip install -r service/requirements.txt

      - name: Run Pytest
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: pytest tests/

      - name: Open Issue on Failure
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Scheduled Smoke Test Failed',
              body: 'The automated daily smoke test failed. Please review the action logs: ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId,
              labels: ['bug', 'automated issue']
            })
